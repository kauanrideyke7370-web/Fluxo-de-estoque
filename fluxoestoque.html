<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fluxo de Estoque</title>
</head>
<body>
    <input type="text" id="p-product" placeholder="Product Name">
    <input type="number" id="p-qty" placeholder="Quantity">
    <input type="number" id="p-price" placeholder="Price">
    <input type="text" id="p-supplier" placeholder="Supplier">
    <input type="email" id="p-email" placeholder="Email">

    <table>
        <thead>
            <tr>
                <th>Product</th>
                <th>Quantity</th>
                <th>Price</th>
                <th>Supplier</th>
                <th>Email</th>
            </tr>
        </thead>
        <tbody>
            <!-- Proper <tbody> content will be dynamically rendered by renderStock() -->
        </tbody>
    </table>

    <script>
        function renderStock() {
            // Logic to dynamically render stock items goes here.
            // It will replace the placeholder [...] with actual data.
        }

        function hideModal() {
            document.getElementById('p-product').value = '';
            document.getElementById('p-qty').value = '';
            document.getElementById('p-price').value = '';
            document.getElementById('p-supplier').value = '';
            document.getElementById('p-email').value = '';
        }
    </script>
</body>
</html>
